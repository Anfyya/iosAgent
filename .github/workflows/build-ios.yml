name: build-ios

on:
  push:
    branches:
      - main
      - master
      - copilot/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift-package-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run swift test
        run: swift test

  xcodegen-validate:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

  build-simulator:
    runs-on: macos-26
    needs:
      - swift-package-tests
      - xcodegen-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun simctl list runtimes
          xcrun simctl list devices available

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Pick simulator destination
        id: simulator
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, subprocess
          preferred = [
              "iPhone 16 Pro",
              "iPhone 16",
              "iPhone 15 Pro",
              "iPhone 15"
          ]
          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "--json"]))
          selected = None
          for runtime, devices in data.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              for name in preferred:
                  if any(device.get("name") == name and device.get("isAvailable", False) for device in devices):
                      selected = f"platform=iOS Simulator,name={name}"
                      break
              if selected:
                  break
          if not selected:
              raise SystemExit("No supported iOS simulator device was found.")
          print(f"destination={selected}")
          PY

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project LocalAIWorkspace.xcodeproj \
            -scheme LocalAIWorkspaceApp \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -configuration Release \
            -resultBundlePath $RUNNER_TEMP/LocalAIWorkspace.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload simulator build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-artifacts
          path: |
            ${{ runner.temp }}/LocalAIWorkspace.xcresult
            ~/Library/Developer/Xcode/DerivedData
          if-no-files-found: ignore

  archive-signed:
    runs-on: macos-26
    needs: build-simulator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Detect signing configuration
        id: signing
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          if [[ -n "$IOS_CERTIFICATE_P12_BASE64" && -n "$IOS_CERTIFICATE_PASSWORD" && -n "$IOS_PROVISIONING_PROFILE_BASE64" && -n "$IOS_KEYCHAIN_PASSWORD" && -n "$IOS_TEAM_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are missing; skipping signed archive/export."
          fi

      - name: Install XcodeGen
        if: steps.signing.outputs.ready == 'true'
        run: brew install xcodegen

      - name: Generate project
        if: steps.signing.outputs.ready == 'true'
        run: xcodegen generate

      - name: Import signing assets
        if: steps.signing.outputs.ready == 'true'
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive app
        if: steps.signing.outputs.ready == 'true'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild \
            -project LocalAIWorkspace.xcodeproj \
            -scheme LocalAIWorkspaceApp \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/LocalAIWorkspace.xcarchive \
            -resultBundlePath $RUNNER_TEMP/LocalAIWorkspace-archive.xcresult \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            archive

      - name: Create export options
        if: steps.signing.outputs.ready == 'true'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        if: steps.signing.outputs.ready == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/LocalAIWorkspace.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload signed artifacts
        if: steps.signing.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: LocalAIWorkspace-signed-artifacts
          path: |
            ${{ runner.temp }}/LocalAIWorkspace.xcarchive
            ${{ runner.temp }}/LocalAIWorkspace-archive.xcresult
            ${{ runner.temp }}/export
          if-no-files-found: ignore
