name: build-ios

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-simulator:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Patch recursive SwiftUI helper
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('App/RootView.swift')
          s = p.read_text()
          a = s.index('    private func nodeView(_ node: FileTreeNode, depth: Int) -> some View {')
          b = s.index('\n    private func buildTree(from entries: [WorkspaceFileEntry]) -> [FileTreeNode] {', a)
          block = s[a:b]
          block = block.replace('    private func nodeView(_ node: FileTreeNode, depth: Int) -> some View {', '    private func nodeView(_ node: FileTreeNode, depth: Int) -> AnyView {')
          block = block.replace('        VStack(alignment: .leading, spacing: 2) {', '        AnyView(VStack(alignment: .leading, spacing: 2) {', 1)
          block = block.rstrip()
          if not block.endswith('\n    }'):
              raise SystemExit('unexpected nodeView shape')
          block = block[:-6] + '\n        )\n    }\n'
          p.write_text(s[:a] + block + s[b:])
          PY

      - name: Generate project
        run: xcodegen generate

      - name: Test package
        run: swift test

      - name: Build simulator
        run: |
          xcodebuild \
            -project LocalAIWorkspace.xcodeproj \
            -scheme LocalAIWorkspaceApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -resultBundlePath $RUNNER_TEMP/LocalAIWorkspace.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-artifacts
          path: |
            ${{ runner.temp }}/LocalAIWorkspace.xcresult
          if-no-files-found: ignore
