name: build-ios

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ipa:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Test package
        run: swift test

      - name: Build unsigned device app
        run: |
          xcodebuild \
            -project LocalAIWorkspace.xcodeproj \
            -scheme LocalAIWorkspaceApp \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            -resultBundlePath $RUNNER_TEMP/LocalAIWorkspace.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/LocalAIWorkspaceApp.app"
          IPA_ROOT="$RUNNER_TEMP/ipa"
          IPA_PATH="$IPA_ROOT/LocalAIWorkspaceApp-unsigned.ipa"

          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle was not found: $APP_PATH"
            find "$RUNNER_TEMP/DerivedData/Build/Products" -maxdepth 3 -name '*.app' -print
            exit 1
          fi

          mkdir -p "$IPA_ROOT/Payload"
          cp -R "$APP_PATH" "$IPA_ROOT/Payload/"
          (cd "$IPA_ROOT" && ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_PATH")
          ls -lh "$IPA_PATH"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: LocalAIWorkspaceApp-unsigned-ipa
          path: ${{ runner.temp }}/ipa/LocalAIWorkspaceApp-unsigned.ipa
          if-no-files-found: error

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            ${{ runner.temp }}/LocalAIWorkspace.xcresult
          if-no-files-found: ignore
