name: LocalAIWorkspace
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_ASSET_PATHS: ""
packages:
  LocalAIWorkspace:
    path: .
targets:
  LocalAIWorkspaceApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
    dependencies:
      - package: LocalAIWorkspace
        product: LocalAIWorkspace
    settings:
      base:
        PRODUCT_NAME: LocalAIWorkspaceApp
        PRODUCT_BUNDLE_IDENTIFIER: com.anfyya.LocalAIWorkspace
        MARKETING_VERSION: "0.13"
        CURRENT_PROJECT_VERSION: "13"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 本地工程助手
        INFOPLIST_KEY_CFBundleShortVersionString: "$(MARKETING_VERSION)"
        INFOPLIST_KEY_CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
schemes:
  LocalAIWorkspaceApp:
    build:
      targets:
        LocalAIWorkspaceApp: all
